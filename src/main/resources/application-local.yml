spring:
  datasource:
    url: jdbc:h2:file:./.data/attendance_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

server:
  port: 8080

jwt:
  secret: change-me-change-me-change-me-change-me-very-secret-key
  access-token-expiration-seconds: 86400

invite:
  base-url: http://localhost:19006
  expiration-hours: 72

internal:
  api:
    key: ${INTERNAL_API_KEY:local-admin-web-key}
